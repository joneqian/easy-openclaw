version: '3.8'

services:
  openclaw-software-company:
    image: openclaw:latest
    container_name: openclaw-software-company
    restart: unless-stopped

    # 端口映射
    ports:
      - '18800:18789' # Gateway 网关端口
      - '3100:3000' # Dashboard 端口

    # 环境变量
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai

    # 数据卷挂载
    volumes:
      - ./openclaw-software-company-data:/home/node/.openclaw
      - /var/run/docker.sock:/var/run/docker.sock

    # Docker 沙箱支持
    privileged: true

    # 网络模式
    network_mode: 'bridge'
